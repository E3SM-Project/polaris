dimensions:
  Time: time
  nCells: NCells
  nEdges: NEdges
  nVertices: NVertices
  nTracers: NTracers
  maxEdges: MaxEdges
  maxEdges2: MaxEdges2
  TWO: MaxCellsOnEdge
  vertexDegree: VertexDegree
  nVertLevels: NVertLayers
  nVertLevelsP1: NVertLayersP1

variables:
  # mesh topology
  cellsOnCell: CellsOnCell
  edgesOnCell: EdgesOnCell
  verticesOnCell: VerticesOnCell
  cellsOnEdge: CellsOnEdge
  edgesOnEdge: EdgesOnEdge
  verticesOnEdge: VerticesOnEdge
  cellsOnVertex: CellsOnVertex
  edgesOnVertex: EdgesOnVertex

  # mesh coordinates
  xCell: XCell
  yCell: YCell
  zCell: ZCell
  latCell: LatCell
  lonCell: LonCell
  xEdge: XEdge
  yEdge: YEdge
  zEdge: ZEdge
  latEdge: LatEdge
  lonEdge: LonEdge
  xVertex: XVertex
  yVertex: YVertex
  zVertex: ZVertex
  latVertex: LatVertex
  lonVertex: LonVertex
  areaCell: AreaCell
  meshDensity: MeshDensity
  areaTriangle: AreaTriangle
  dvEdge: DvEdge
  dcEdge: DcEdge
  angleEdge: AngleEdge
  kiteAreasOnVertex: KiteAreasOnVertex
  weightsOnEdge: WeightsOnEdge

  # Coriolis
  fCell: FCell
  fEdge: FEdge
  fVertex: FVertex

  # vertical coordinate
  minLevelCell: MinLayerCell
  maxLevelCell: MaxLayerCell
  bottomDepth: BottomGeomDepth
  vertCoordMovementWeights: VertCoordMovementWeights
  # Note: restingThickness in MPAS-Ocean requires conversion to
  #       RefPseudoThickness in Omega (handled in write_vert_coord_dataset)

  # tracers
  temperature: Temperature
  salinity: Salinity
  tracer1: Debug1
  tracer2: Debug2
  tracer3: Debug3

  # state
  # Note: layerThickness in MPAS-Ocean requires conversion to
  #       PseudoThickness in Omega (handled in write_model_dataset)
  normalVelocity: NormalVelocity
  # Note: vertVelocityTop in MPAS-Ocean has no Omega equivalent and
  #       VerticalPseudoVelocity in Omega has no MPAS-Ocean equivalent
  surfacePressure: SurfacePressure

  # auxiliary state
  ssh: SshCell
  windStressZonal: WindStressZonal
  windStressMeridional: WindStressMeridional
  relativeVorticity: RelVortVertex

  # vertical coordinate diagnostics
  zMid: GeomZMid
  zInterface: GeomZInterface
  pressure: PressureMid


config:
- section:
    time_management: TimeIntegration
  options:
    config_start_time: StartTime
    config_stop_time: StopTime
    config_run_duration: RunDuration
    config_calendar_type: CalendarType

- section:
    time_integration: TimeIntegration
  options:
    config_time_integrator: TimeStepper
    config_dt: TimeStep

- section:
    time_integration: State
  options:
    config_number_of_time_levels: NTimeLevels

- section:
    decomposition: Decomp
  options:
    config_num_halos: HaloWidth

- section:
    io: IO
  options:
    config_pio_num_iotasks: IOTasks
    config_pio_stride: IOStride

- section:
    advection: Advection
  options:
    config_thickness_flux_type: FluxThicknessType

- section:
    advection: Advection
  options:
    config_horiz_tracer_adv_order: HorzTracerFluxOrder

- section:
    advection: Advection
  options:
    config_vert_tracer_adv_flux_order: VerticalTracerFluxOrder

- section:
    hmix_del2: Tendencies
  options:
    config_use_mom_del2: VelDiffTendencyEnable
    config_mom_del2: ViscDel2
    config_use_tracer_del2: TracerDiffTendencyEnable

- section:
    hmix_del4: Tendencies
  options:
    config_use_mom_del4: VelHyperDiffTendencyEnable
    config_mom_del4: ViscDel4
    config_use_tracer_del4: TracerHyperDiffTendencyEnable

- section:
    forcing: Tendencies
  options:
    config_use_bulk_wind_stress: WindForcingTendencyEnable

- section:
    debug: Tendencies
  options:
    config_disable_vel_explicit_bottom_drag: not BottomDragTendencyEnable

- section:
    debug: Tendencies
  options:
    config_disable_tr_adv: not TracerHorzAdvTendencyEnable

- section:
    debug: Tendencies
  options:
    config_disable_vel_vadv: not VelocityVertAdvTendencyEnable

- section:
    debug: Tendencies
  options:
    config_disable_thick_hadv: not ThicknessFluxTendencyEnable

- section:
    debug: Tendencies
  options:
    config_disable_thick_vadv: not ThicknessVertAdvTendencyEnable

- section:
    debug: Tendencies
  options:
    config_disable_vel_pgrad: not PressureGradTendencyEnable

- section:
    debug: Tendencies
  options:
    config_disable_vel_vmix: not VelVertMixTendencyEnable

- section:
    bottom_drag: Tendencies
  options:
    config_explicit_bottom_drag_coeff: BottomDragCoeff

- section:
    manufactured_solution: ManufacturedSolution
  options:
    config_manufactured_solution_wavelength_x: WavelengthX
    config_manufactured_solution_wavelength_y: WavelengthY
    config_manufactured_solution_amplitude: Amplitude

- section:
    eos: Eos
  options:
    config_eos_type: EosType

- section:
    eos_linear: [Eos, Linear]
  options:
    config_eos_linear_alpha: not DRhoDT
    config_eos_linear_beta: DRhoDS
    config_eos_linear_densityref: RhoT0S0

- section:
    ocean_constants: VertCoord
  options:
    config_density0: Density0

- section:
    cvmix: [VertMix, Background]
  options:
    config_cvmix_background_diffusion: Diffusivity
    config_cvmix_background_viscosity: Viscosity

- section:
    cvmix: [VertMix, Convective]
  options:
    config_use_cvmix_convection: Enable
    config_cvmix_convective_diffusion: Diffusivity
    config_cvmix_convective_triggerBVF: TriggerBVF

- section:
    cvmix: [VertMix, Shear]
  options:
    config_use_cvmix_shear: Enable
    config_cvmix_shear_PP_nu_zero: NuZero
    config_cvmix_shear_PP_alpha: Alpha
    config_cvmix_shear_PP_exp: Exponent
