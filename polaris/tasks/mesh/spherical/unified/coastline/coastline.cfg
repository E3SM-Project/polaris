[coastline]
# target resolution (degrees)
resolution_latlon = 0.25

# whether to apply shared critical transects from geometric_features before
# flood filling the candidate ocean mask
include_critical_transects = True

# threshold used to convert remapped ice and grounded masks to binary masks
mask_threshold = 0.5

# sea level used in the bedrock threshold
sea_level_elevation = 0.0

# number of latitude rows to process in each distance-query chunk
distance_chunk_size = 64


[viz_coastline]
# rows south of this latitude are shown in the Antarctic stereographic plots
antarctic_max_latitude = -45.0

# output resolution for the diagnostic plots
dpi = 200

# symmetric absolute limit in meters for signed-distance plots
signed_distance_limit = 500000.0
