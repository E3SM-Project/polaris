# config options related to visualizing the final unified base mesh
[viz_unified_base_mesh]

# output resolution for diagnostic plots
dpi = 200

# point size for fine-cell scatter markers on the global alignment plot
mesh_point_size = 0.15

# point size for fine-cell scatter markers on the regional alignment plot
regional_mesh_point_size = 1.2

# padding around the retained-river bounds for the regional plot
regional_padding_degrees = 3.0


# config options related to visualizing mesh and sizing-field resolution
[viz_base_mesh_resolution]

# colormap for mesh-resolution and sizing-field plots
colormap_name = 3Wbgy5

# color normalization for mesh-resolution and sizing-field plots
norm_type = linear

# use default linear normalization bounds from the plotted data
norm_args = {}
