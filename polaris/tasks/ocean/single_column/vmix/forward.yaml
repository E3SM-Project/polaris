ocean:
  time_management:
    # TODO set duration from cfg file
    config_run_duration: 0010_00:00:00
  hmix_del2:
    config_use_mom_del2: false
    config_use_tracer_del2: false
  hmix_del4:
    config_use_mom_del4: false
    config_use_tracer_del4: false
  cvmix:
    config_cvmix_background_diffusion: 1.e-5
    config_cvmix_background_viscosity: 1.e-4
    config_cvmix_num_ri_smooth_loops: 2
  eos:
    config_eos_type: linear
  eos_linear:
    config_eos_linear_alpha: 0.2
    config_eos_linear_beta: 0.01
    # 1000.0 + 0.2 * 5 - 0.01 * 35
    config_eos_linear_densityref: 1000.65
  forcing:
    config_use_bulk_wind_stress: true
  debug:
    config_disable_vel_explicit_bottom_drag: true
    config_disable_tr_adv: false

mpas-ocean:
  frazil_ice:
    config_use_frazil_ice_formation: false
  tracer_forcing_activeTracers:
    config_use_activeTracers_surface_bulk_forcing: true
    config_use_activeTracers_surface_restoring: false
    config_use_activeTracers_interior_restoring: false
  cvmix:
    config_use_cvmix_kpp: false
    config_cvmix_background_scheme: constant
    config_cvmix_shear_mixing_scheme: KPP
  debug:
    config_disable_vel_vmix: false
    config_disable_tr_vmix: false
  streams:
    output:
      output_interval: 0000_01:00:00
      contents:
      - layerThickness
      - tracers
      - vertNonLocalFlux
      - xtime
      - zMid
      - zTop
      - velocityZonal
      - velocityMeridional
      - bulkRichardsonNumber
      - bulkRichardsonNumberBuoy
      - potentialDensity
      - unresolvedShear
      - boundaryLayerDepth
      - surfaceFrictionVelocity
      - surfaceBuoyancyForcing
      - windStressZonal
      - windStressMeridional
      - transportVelocityZonal
      - transportVelocityMeridional
      - RiTopOfCell
      - BruntVaisalaFreqTop
      - vertViscTopOfCell
      - vertDiffTopOfCell

Omega:
  Tendencies:
    ThicknessFluxTendencyEnable: true
    PVTendencyEnable: false
    KETendencyEnable: false
    SSHTendencyEnable: false
    PressureGradTendencyEnable: false
  IOStreams:
    InitialVertCoord:
      UsePointerFile: false
      Filename: init.nc
      Mode: read
      Precision: double
      Freq: 1
      FreqUnits: OnStartup
      UseStartEnd: false
      Contents:
        - InitVertCoord
    InitialState:
      UsePointerFile: false
      Filename: init.nc
      Mode: read
      Precision: double
      Freq: 1
      FreqUnits: OnStartup
      UseStartEnd: false
      Contents:
        - State
        - Base
        - Tracers
        - WindStressZonal
        - WindStressMeridional
    RestartRead:
      UsePointerFile: true
      PointerFilename: ocn.pointer
      Mode: read
      Precision: double
      Freq: 1
      FreqUnits: OnStartup
      UseStartEnd: true
      StartTime: 0001-01-01_00:00:01
      EndTime: 99999-12-31_00:00:00
      Contents:
        - Restart
    RestartWrite:
      UsePointerFile: true
      PointerFilename: ocn.pointer
      Filename: ocn.restart.$Y-$M-$D_$h.$m.$s
      Mode: write
      IfExists: replace
      Precision: double
      Freq: 1
      FreqUnits: day
      UseStartEnd: false
      Contents:
        - Restart
    History:
      Filename: output.nc
      Freq: 1
      FreqUnits: Seconds
      IfExists: append
      # effectively never
      FileFreq: 9999
      FileFreqUnits: years
      Contents:
      - AuxiliaryState
      - State
      - ZMid
      - Tracers
      - SshCell
      - Eos
