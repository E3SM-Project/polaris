ocean:
  time_management:
    # TODO set duration from cfg file
    config_run_duration: 0010_00:00:00
  hmix_del2:
    config_use_mom_del2: false
    config_use_tracer_del2: false
  hmix_del4:
    config_use_mom_del4: false
    config_use_tracer_del4: false
  cvmix:
    config_cvmix_background_diffusion: 1.e-5
    config_cvmix_background_viscosity: 1.e-4
    #config_cvmix_num_ri_smooth_loops: 2
  eos:
    config_eos_type: linear
  eos_linear:
    config_eos_linear_alpha: 0.2
    config_eos_linear_beta: 0.01
    # 1000.0 + 0.2 * 5 - 0.01 * 35
    config_eos_linear_densityref: 1000.65
  forcing:
    config_use_bulk_wind_stress: true
  debug:
    config_disable_vel_explicit_bottom_drag: true
    config_disable_tr_adv: false
  tracer_forcing_activeTracers:
    config_salinity_restoring_constant_piston_velocity: 1.585e-5

mpas-ocean:
  frazil_ice:
    config_use_frazil_ice_formation: false
  tracer_forcing_activeTracers:
    config_use_activeTracers_surface_bulk_forcing: true
    config_use_activeTracers_surface_restoring: false
    config_use_activeTracers_interior_restoring: false
  cvmix:
    config_use_cvmix_kpp: false
    config_cvmix_background_scheme: constant
    config_cvmix_shear_mixing_scheme: KPP
  debug:
    config_disable_vel_vmix: false
    config_disable_tr_vmix: false
  streams:
    forcing_data:
      type: input
      filename_template: init.nc
      input_interval: initial_only
      contents:
      - tracersSurfaceRestoringFields
      - tracersInteriorRestoringFields
      - tracersExponentialDecayFields
      - tracersIdealAgeFields
      - tracersTTDFields
      - windStressZonal
      - windStressMeridional
      - landIceSurfaceTemperature
      - atmosphericPressure
      - latentHeatFlux
      - sensibleHeatFlux
      - shortWaveHeatFlux
      - evaporationFlux
      - rainFlux
      - seaIceFreshWaterFlux
      - icebergFreshWaterFlux
      - riverRunoffFlux
      - iceRunoffFlux
    KPP_testing: {}
    mixedLayerDepthsOutput:
      type: output
      contents:
      - xtime
      - dThreshMLD
      - tThreshMLD
    output:
      type: output
      filename_template: output.nc
      output_interval: 0001_00:00:00
      clobber_mode: truncate
      contents:
      - tracers
      - xtime
      - daysSinceStartOfSim
      - zMid
      - zTop
      - normalVelocity
      - velocityZonal
      - velocityMeridional
      - layerThickness
      - kineticEnergyCell
      - relativeVorticityCell
      - accumulatedFrazilIceMass
      - accumulatedFrazilIceSalinity
      - frazilLayerThicknessTendency
      - frazilTemperatureTendency
      - frazilSalinityTendency
      - vertNonLocalFlux
      - bulkRichardsonNumber
      - bulkRichardsonNumberBuoy
      - potentialDensity
      - unresolvedShear
      - boundaryLayerDepth
      - surfaceFrictionVelocity
      - surfaceBuoyancyForcing
      - transportVelocityZonal
      - transportVelocityMeridional
      - RiTopOfCell
      - BruntVaisalaFreqTop
      - vertViscTopOfCell
      - vertDiffTopOfCell

Omega:
  # This is needed for consistency with MPAS-O
  SurfaceRestoring:
    TracersToRestore: [Salinity]
  IOStreams:
    History:
      Filename: output.nc
      Freq: 1
      FreqUnits: Days
      IfExists: append
      # effectively never
      FileFreq: 9999
      FileFreqUnits: years
      Contents:
      - AuxiliaryState
      - State
      - GeomZMid
      - Tracers
      - SshCell
      - Eos
