ocean:
  time_management:
    config_stop_time: none
  time_integration:
    config_dt: 0000_00:10:00
  forcing:
    config_use_bulk_wind_stress: false

mpas-ocean:
  run_modes:
    config_ocean_run_mode: forward
  split_explicit_ts:
    config_btr_dt: 0000_00:00:30
  forcing:
    config_bulk_wind_stress_interp_isotropic: true
    config_use_bulk_thickness_flux: true
  streams:
    restart: {}

Omega:
  Tendencies:
    ThicknessFluxTendencyEnable: true
    PVTendencyEnable: false
    KETendencyEnable: false
    SSHTendencyEnable: false
    PressureGradTendencyEnable: false
  IOStreams:
    InitialVertCoord:
      UsePointerFile: false
      Filename: init.nc
      Mode: read
      Precision: double
      Freq: 1
      FreqUnits: OnStartup
      UseStartEnd: false
      Contents:
        - InitVertCoord
    InitialState:
      UsePointerFile: false
      Filename: init.nc
      Mode: read
      Precision: double
      Freq: 1
      FreqUnits: OnStartup
      UseStartEnd: false
      Contents:
        - State
        - Base
        - Tracers
        - TracersMonthlySurfClimoCell
        - WindStressZonal
        - WindStressMeridional
    RestartRead:
      UsePointerFile: true
      PointerFilename: ocn.pointer
      Mode: read
      Precision: double
      Freq: 1
      FreqUnits: OnStartup
      UseStartEnd: true
      StartTime: 0001-01-01_00:00:01
      EndTime: 99999-12-31_00:00:00
      Contents:
        - Restart
    RestartWrite:
      UsePointerFile: true
      PointerFilename: ocn.pointer
      Filename: ocn.restart.$Y-$M-$D_$h.$m.$s
      Mode: write
      IfExists: replace
      Precision: double
      Freq: 1
      FreqUnits: day
      UseStartEnd: false
      Contents:
        - Restart
