ocean:
  time_management:
    config_stop_time: none
    config_run_duration: 20_00:00:00

mpas-ocean:
  streams:
    output:
      type: output
      filename_template: output.nc
      output_interval: 0000-00-01_00:00:00
      clobber_mode: truncate
      contents:
      - tracers
      - xtime
      - density
      - daysSinceStartOfSim
      - relativeVorticity
      - layerThickness

Omega:
  IOStreams:
    History:
      UsePointerFile: false
      Filename: output.nc
      Mode: write
      IfExists: append
      Precision: double
      Freq: 1
      FreqUnits: days
      UseStartEnd: false
      Contents:
      - State
      - AuxState
      - Tracers
      - KineticEnergyCell
      - Eos
      FileFreq: 9999
      FileFreqUnits: Years
