ocean:
  time_management:
    config_stop_time: none
    config_run_duration: {{ run_duration }}
  time_integration:
    config_dt: {{ dt }}
    config_time_integrator: {{ time_integrator }}
  hmix_del2:
    config_use_mom_del2: False
    config_use_tracer_del2: False
  hmix_del4:
    config_use_mom_del4: False
    config_use_tracer_del4: False
  debug:
    config_disable_thick_vadv: true
    config_disable_vel_vadv: true

mpas-ocean:
  split_explicit_ts:
    config_btr_dt: {{ btr_dt }}
  debug:
    config_disable_thick_vadv: true
    config_check_ssh_consistency: false
    config_disable_vel_surface_stress: true
    config_disable_vel_vmix: true
    config_disable_tr_hmix: true
    config_disable_tr_vmix: true
    config_disable_tr_sflux: true
    config_disable_tr_nonlocalflux: true
  bottom_drag:
    config_bottom_drag_mode: implicit
    config_implicit_bottom_drag_type: constant
    config_implicit_constant_bottom_drag_coeff: 0.0
  AM_globalStats:
    config_AM_globalStats_enable: true
    config_AM_globalStats_compute_on_startup: true
    config_AM_globalStats_write_on_startup: true
  streams:
    restart: {}
    output:
      type: output
      filename_template: output.nc
      output_interval: {{ output_interval }}
      clobber_mode: truncate
      reference_time: 0001-01-01_00:00:00
      contents:
      - xtime
      - normalVelocity
      - layerThickness
      - ssh
      - velocityZonal
      - velocityMeridional
    globalStatsOutput:
      precision: double
      output_interval: 0001_00:00:0

Omega:
  Tendencies:
    TracerVertAdvTendencyEnable: false
  IOStreams:
    History:
      Filename: output.nc
      Freq: {{ output_freq }}
      FreqUnits: seconds
      IfExists: append
      # effectively never
      FileFreq: 9999
      FileFreqUnits: years
      Contents:
        - time
        - PseudoThickness
        - NormalVelocity
        - SshCell
        - Eos
