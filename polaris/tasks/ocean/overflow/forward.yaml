ocean:
  time_management:
    config_stop_time: none
    config_run_duration: {{ run_duration }}
  hmix_del2:
    config_use_mom_del2: true
    config_mom_del2: {{ nu }}
    config_use_tracer_del2: false
  hmix_del4:
    config_use_mom_del4: false
    config_use_tracer_del4: false
  cvmix:
    config_use_cvmix_convection: true
    config_use_cvmix_shear: false

mpas-ocean:
  time_management:
    config_stop_time: none
    config_run_duration: {{ run_duration }}
  time_integration:
    config_dt: {{ dt }}
    config_time_integrator: split_explicit_ab2
  io:
    config_write_output_on_startup: false
  bottom_drag:
    config_implicit_bottom_drag_type: constant
    config_implicit_constant_bottom_drag_coeff: 0.01
  cvmix:
    config_cvmix_background_scheme: none
  split_explicit_ts:
    config_btr_dt: {{ btr_dt }}
  streams:
    mesh:
      filename_template: initial_state.nc
    input:
      filename_template: initial_state.nc
    restart:
      output_interval: 0010_00:00:00
    output:
      type: output
      filename_template: output.nc
      output_interval: {{ output_interval }}
      clobber_mode: truncate
      contents:
      - tracers
      - xtime
      - normalVelocity
      - layerThickness
      - ssh
      - vertVelocityTop
      - density
      - daysSinceStartOfSim
      - relativeVorticity

Omega:
  TimeIntegration:
    TimeStepper: RungeKutta4
    TimeStep: 0000_00:00:15
  Tendencies:
    SSHTendencyEnable: false
  Tracers:
    Base: [Temperature, Salinity]
  VertMix:
    Background:
      Diffusivity: 0.0
      Viscosity: 0.0
  IOStreams:
    InitialVertCoord:
      UsePointerFile: false
      Filename: initial_state.nc
      Mode: read
      Precision: double
      Freq: 1
      FreqUnits: OnStartup
      UseStartEnd: false
      Contents:
        - InitVertCoord
    InitialState:
      UsePointerFile: false
      Filename: initial_state.nc
      Mode: read
      Precision: double
      Freq: 1
      FreqUnits: OnStartup
      UseStartEnd: false
      Contents:
        - State
        - Base
        - Tracers
    RestartRead:
      UsePointerFile: true
      PointerFilename: ocn.pointer
      Mode: read
      Precision: double
      Freq: 1
      FreqUnits: OnStartup
      UseStartEnd: true
      StartTime: 0001-01-01_00:00:01
      EndTime: 99999-12-31_00:00:00
      Contents:
        - Restart
    RestartWrite:
      UsePointerFile: true
      PointerFilename: ocn.pointer
      Filename: ocn.restart.$Y-$M-$D_$h.$m.$s
      Mode: write
      IfExists: replace
      Precision: double
      Freq: 9999
      FreqUnits: months
      UseStartEnd: false
      Contents:
        - Restart
    History:
      UsePointerFile: false
      Filename: output.nc
      Mode: write
      IfExists: append
      Precision: double
      Freq: {{ output_freq }}
      FreqUnits: seconds
      UseStartEnd: false
      Contents:
        - Tracers
        - State
        - KineticEnergyCell
        - SpecVol
        - BottomDepth
